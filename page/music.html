<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Music Pro</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="music-app">

  <h2>🎧 Music Pro</h2>

  <!-- search -->
  <input 
    type="text" 
    placeholder="🔍 Tìm nhạc..." 
    oninput="searchTrack(this.value)"
  >

  <!-- youtube -->
  <input 
    type="text" 
    id="youtubeLink" 
    placeholder="Dán link YouTube..."
  >
  <button onclick="addYoutube()">Add YouTube</button>

  <!-- upload -->
  <div class="upload">
    <input type="file" id="audioInput" accept="audio/*">
    <button onclick="uploadAudio()">MP3</button>

    <input type="file" id="videoInput" accept="video/*">
    <button onclick="uploadVideo()">Video</button>
  </div>

  <!-- player -->
  <div class="player-card">
    <h3 id="nowPlaying">No song</h3>

    <div id="player"></div>

    <!-- progress -->
    <input type="range" id="progress" value="0">

    <!-- controls -->
    <div class="controls">
      <button onclick="prev()">⏮</button>
      <button onclick="togglePlay()">▶/⏸</button>
      <button onclick="next()">⏭</button>
      <button onclick="toggleShuffle()">🔀</button>
      <button onclick="toggleRepeat()">🔁</button>
    </div>

    <!-- volume -->
    <input type="range" id="volume" min="0" max="1" step="0.01">
  </div>

  <!-- playlist -->
  <div id="playlist"></div>

</div>

<!-- mini player -->
<div id="miniPlayer" onclick="toggleMini()">
  🎧 <span id="miniTitle"></span>
</div>

<script src="../js/music.js"></script>
</body>
</html>
