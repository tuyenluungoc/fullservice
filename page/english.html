<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Music Pro</title>
<link rel="stylesheet" href="../style.css">
</head>
<h2>📚 English Learning</h2>

<div class="section">
  <h3>📖 Vocabulary</h3>

  <input id="searchWord" placeholder="🔍 Tìm từ..." oninput="searchWord(this.value)">

  <div class="input-group">
    <input id="word" placeholder="Từ">
    <input id="meaning" placeholder="Nghĩa">
    <input id="example" placeholder="Ví dụ">
    <button onclick="addWord()">Thêm</button>
  </div>

  <div id="wordList"></div>
</div>

<hr>

<div class="section speaking-box">
  <h3>🎤 Speaking Practice</h3>

  <div class="speaking-actions">
    <button onclick="randomQuestion()">Random</button>
    <button onclick="copyQuestion()">Copy</button>
  </div>

  <p id="question"></p>

  <textarea id="answerBox" placeholder="Viết câu trả lời của bạn..."></textarea>

  <div class="speaking-actions">
    <button onclick="saveAnswer()">Lưu câu trả lời</button>
  </div>
</div>
<script src="../js/english.js"></script>
</body>
</html>
